<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQK数字贸易系统 - 鉴权</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a2342 25%, #1a2342 75%, #0a0e27 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .container {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
            padding: 50px;
            border-radius: 20px;
            box-shadow: 
                0 0 80px rgba(59, 130, 246, 0.6),
                0 0 40px rgba(37, 99, 235, 0.4),
                0 25px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(59, 130, 246, 0.4);
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid rgba(59, 130, 246, 0.7);
            position: relative;
            z-index: 1;
            animation: glow 4s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 80px rgba(59, 130, 246, 0.6), 0 0 40px rgba(37, 99, 235, 0.4), 0 25px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 100px rgba(59, 130, 246, 0.8), 0 0 60px rgba(37, 99, 235, 0.6), 0 25px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(59, 130, 246, 0.5); }
        }
        
        h1 {
            background: linear-gradient(90deg, #38bdf8, #60a5fa, #3b82f6, #60a5fa, #38bdf8);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 32px;
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.8);
            animation: shimmer 2s linear infinite;
            font-weight: 900;
            letter-spacing: 2px;
        }
        
        @keyframes shimmer {
            to { background-position: 300% center; }
        }
        
        .subtitle {
            color: #60a5fa;
            margin-bottom: 38px;
            font-size: 14px;
            letter-spacing: 3px;
            opacity: 0.9;
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        label {
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
            color: #cbd5e1;
            text-align: left;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid rgba(59, 130, 246, 0.6);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            background: rgba(30, 41, 59, 0.7);
            color: #e2e8f0;
            transition: all 0.3s;
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.15);
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 
                0 0 30px rgba(59, 130, 246, 0.6),
                inset 0 0 25px rgba(59, 130, 246, 0.2);
        }
        
        input[type="password"]::placeholder {
            color: #3b82f6;
            opacity: 0.6;
        }
        
        button {
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 35%, #2563eb 65%, #1d4ed8 100%);
            background-size: 200% 100%;
            color: white;
            padding: 18px 36px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 
                0 0 30px rgba(59, 130, 246, 0.6),
                0 6px 20px rgba(59, 130, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: buttonShimmer 3s linear infinite;
        }
        
        @keyframes buttonShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        button:hover {
            background: linear-gradient(135deg, #2563eb 0%, #60a5fa 35%, #3b82f6 65%, #2563eb 100%);
            transform: translateY(-3px);
            box-shadow: 
                0 0 50px rgba(59, 130, 246, 0.9),
                0 10px 30px rgba(59, 130, 246, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        
        button:active {
            transform: translateY(-1px);
        }
        
        button:disabled {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }
        
        .error-message {
            color: #fca5a5;
            margin-top: 20px;
            font-size: 14px;
            display: none;
            padding: 14px;
            background: rgba(248, 113, 113, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.4);
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.3);
        }
        
        .success-message {
            color: #86efac;
            margin-top: 20px;
            font-size: 14px;
            display: none;
            padding: 14px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(34, 197, 94, 0.4);
            text-shadow: 0 0 10px rgba(134, 239, 172, 0.3);
        }
        
        .hint {
            color: #38bdf8;
            font-size: 13px;
            margin-top: 28px;
            font-style: italic;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JQK数字贸易系统</h1>
        <p class="subtitle">请输入鉴权码以访问系统</p>
        
        <div class="form-group">
            <label for="authCode">鉴权码</label>
            <input type="password" id="authCode" placeholder="请输入鉴权码" autocomplete="off">
        </div>
        
        <button id="submitBtn" onclick="verifyAuth()">验证</button>
        
        <p class="error-message" id="errorMsg">鉴权码错误，请重新输入</p>
        <p class="success-message" id="successMsg">验证成功，正在跳转...</p>
        
        <p class="hint">如需帮助请联系管理员</p>
    </div>

    <script>
        const VIKA_TOKEN = 'uskNUrvWvJoD3VuQ5zW7GYH';
        const DATASHEET_ID = 'dstLZmhhzq83Q8DKFc';
        const VIEW_ID = 'viwPT1uwLkzGk';
        
        async function fetchAuthRecords() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records?viewId=${VIEW_ID}`, {
                    headers: {
                        'Authorization': `Bearer ${VIKA_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                if (result.success && result.data && result.data.records) {
                    return result.data.records;
                }
                return [];
            } catch (error) {
                console.error('获取鉴权码失败:', error);
                return [];
            }
        }
        
        async function deleteAuthRecord(recordId) {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records?recordIds=${recordId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${VIKA_TOKEN}`
                    }
                });
                
                const result = await response.json();
                if (result.success) {
                    return true;
                }
                console.error('删除鉴权码失败:', result);
                return false;
            } catch (error) {
                console.error('删除鉴权码出错:', error);
                return false;
            }
        }
        
        async function verifyAuth() {
            const input = document.getElementById('authCode').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!input) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '请输入鉴权码';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '验证中...';
            
            const authRecords = await fetchAuthRecords();
            const matchedRecord = authRecords.find(record => record.fields['api-number'] === input);
            
            if (matchedRecord) {
                successMsg.style.display = 'block';
                successMsg.textContent = '验证成功，正在跳转...';
                submitBtn.textContent = '请稍候...';
                
                await deleteAuthRecord(matchedRecord.recordId);
                
                setTimeout(() => {
                    window.location.href = 'count.html';
                }, 1000);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '鉴权码错误，请重新输入';
                submitBtn.disabled = false;
                submitBtn.textContent = '验证';
                document.getElementById('authCode').value = '';
                document.getElementById('authCode').focus();
            }
        }
        
        document.getElementById('authCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyAuth();
            }
        });
    </script>
</body>
</html>
